<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Aquarium</title>
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        body {}


        .containerfull {
            background-image: url('sebastian-pena-lambarri-7i5HMCGupVw-unsplash.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            height: 100vh;
        }

        .container-fluid {
            width: 100%;
            height: 50px;
        }


        .container-fluid img {
            height: 80px;
            margin-top: 5px;

        }

        .navbar-nav .nav-link {
            font-weight: 500;
            margin: 0 8px;
        }


        .navbar {
            padding: 10px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .navbar a {
            color: rgb(255, 255, 255);
            
        }

        .search {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0px;

        }

        .search input {
            padding: 2px;
            border-radius: 4px 4px 4px 4px;
            margin-right: 1px;
            color: black;
            background-color: rgb(255, 255, 255);
            border: 0px solid white;
        }

        .search button {

            background-color: lightseagreen;
            color: white;
            text-decoration: none;
            border: 0px solid lightseagreen;
            border-radius: 3px;
            padding: 2px;


        }

        .btnl {
            background-color: lightseagreen;
            color: white;
            text-decoration: none;
            border: 0px solid lightseagreen;
            border-radius: 3px;
            padding: 2px;
            margin-left: 5px;
        }

        .btn:hover {
            background-color: rgb(40, 218, 209);
            accent-color: rgb(40, 218, 209);
            color: rgb(0, 0, 0);
            transition: 0.3s;
            box-shadow: 1px 1px 5px 0px;
        }
        
        .btn:hover {
            background-color: rgb(40, 218, 209);
            accent-color: rgb(40, 218, 209);
            color: rgb(0, 0, 0);
            transition: 0.3s;
            box-shadow: 1px 1px 5px 0px;
        }

        .btnl:hover {
            background-color: rgb(40, 218, 209);
            accent-color: rgb(40, 218, 209);
            color: rgb(0, 0, 0);
            transition: 0.3s;
            box-shadow: 1px 1px 5px 0px;
        }

        input{
            border: 2px solid #007BFF;
            border-radius: 4px;
            outline: none;
        }

        input:focus {
            border-color: #28A745;
            outline: 0.5px solid rgb(255, 255, 255);
        }
    </style>
</head>

<body>
    <div class="containerfull">
        <!-- Navbar -->

        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg bg-body-tertiary-transparent">
            <div class="container-fluid">

                <!-- Logo -->
                <a class="navbar-brand" href="#">
                    <img src="ChatGPT Image May 27, 2026, 01_22_08 PM.png" alt="Nexus Aquarium Logo">
                </a>

                <!-- Mobile Toggle -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">

                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Navbar Content -->
                <div class="collapse navbar-collapse" id="navbarSupportedContent">

                    <!-- Center Navigation -->
                    <ul class="navbar-nav mx-auto mb-2 mb-lg-0">

                        <li class="nav-item">
                            <a class="nav-link homenav" href="#">Home</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">About</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Gallery</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Marine Life</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Events</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Feedback</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Contact</a>
                        </li>

                    </ul>

                    <!-- Search Box Right -->
                    <form class="search">
                        <input type="search" placeholder="search">
                        <button class="btn">Search</button>
                    </form>
                    <button class="btnl">Login</button>
                    <button class="btnl">Register</button>


                </div>
            </div>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
